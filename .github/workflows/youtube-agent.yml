name: 🎬 YouTube Auto-Poster (Free Tier)

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Video topic (leave blank to auto-fetch trending topic)'
        required: false
        default: ''

jobs:
  generate-and-upload:
    runs-on: ubuntu-22.04
    timeout-minutes: 40

    steps:

      - name: 📂 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🎞️ Install FFmpeg
        run: |
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|http://archive.ubuntu.com/ubuntu|g' /etc/apt/sources.list || true
          sudo apt-get update -o Acquire::Retries=3 --fix-missing || true
          for i in 1 2 3; do
            sudo apt-get install -y ffmpeg espeak-ng --fix-missing && break
            echo "⚠️ Attempt $i failed — retrying..."
            sleep 15
            sudo apt-get update --fix-missing || true
          done
          ffmpeg -version | head -1
          espeak-ng --version

      - name: 📦 Install packages
        run: |
          npm install axios form-data node-fetch
          pip install kokoro soundfile pytrends requests --quiet
          echo "✅ All packages ready"

      - name: 🔥 Fetch trending topic
        id: topic
        run: |
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            TOPIC="${{ github.event.inputs.topic }}"
            echo "📌 Using manual topic: $TOPIC"
          else
            echo "🔍 Fetching trending topic..."
            TOPIC=$(python3 scripts/fetch_trending.py)
            echo "🔥 Trending topic: $TOPIC"
          fi
          echo "topic=$TOPIC" >> $GITHUB_OUTPUT

      - name: 🤖 Generate script with Groq
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          node scripts/generate_script.js "${{ steps.topic.outputs.topic }}"
          echo "✅ Script generated"

      - name: 📝 Generate YouTube metadata
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          node scripts/generate_metadata.js
          echo "✅ Metadata generated"

      - name: 🎙️ Generate voiceover (Kokoro neural TTS)
        run: |
          python3 scripts/generate_tts.py
          ls -lh output/voiceover.mp3
          echo "✅ Voiceover ready"

      - name: 🖼️ Download scene images (context-matched)
        env:
          UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY }}
        run: |
          node scripts/download_images.js
          python3 scripts/verify_images.py
          echo "✅ Images ready"

      - name: 🎵 Get background music
        env:
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          node scripts/get_music.js
          echo "✅ Music ready"

      - name: 🎬 Assemble video
        run: |
          node scripts/assemble_video.js
          ls -lh output/final_video.mp4
          echo "✅ Video assembled"

      - name: 🖼️ Generate thumbnail
        run: |
          node scripts/generate_thumbnail.js
          echo "✅ Thumbnail ready"

      - name: 📤 Upload to YouTube
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          node scripts/upload_youtube.js
          echo "✅ Uploaded!"

      - name: 📊 Save run log
        if: always()
        run: |
          mkdir -p logs
          echo "$(date '+%Y-%m-%d %H:%M') | ${{ steps.topic.outputs.topic }}" >> logs/history.txt
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add logs/history.txt
          git diff --staged --quiet || git commit -m "📝 Log: ${{ steps.topic.outputs.topic }}"
          git push || true
