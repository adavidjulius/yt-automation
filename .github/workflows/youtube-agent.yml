name: 🎬 YouTube Shorts Auto-Poster (Free Tier)

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Video topic (leave blank to auto-fetch trending)'
        required: false
        default: ''

jobs:
  generate-and-upload:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:

      - name: 📂 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🎞️ Install FFmpeg
        run: |
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|http://archive.ubuntu.com/ubuntu|g' /etc/apt/sources.list || true
          sudo apt-get update -o Acquire::Retries=3 --fix-missing || true
          for i in 1 2 3; do
            sudo apt-get install -y ffmpeg --fix-missing && break
            echo "⚠️ Attempt $i failed — retrying in 15s..."
            sleep 15
            sudo apt-get update --fix-missing || true
          done
          ffmpeg -version | head -1
          echo "✅ FFmpeg ready"

      - name: 📦 Install Node packages
        run: |
          npm install axios form-data node-fetch
          echo "✅ Node packages ready"

      - name: 🐍 Install Python packages
        run: |
          pip install requests gTTS soundfile numpy --quiet
          pip install edge-tts --quiet
          pip install torch==2.0.1 torchvision==0.15.2 --index-url https://download.pytorch.org/whl/cpu --quiet
          pip install opencv-python-headless --quiet
          echo "✅ Python packages ready"

      - name: 🔥 Fetch trending topic
        id: topic
        run: |
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            TOPIC="${{ github.event.inputs.topic }}"
            echo "📌 Manual topic: $TOPIC"
          else
            echo "🔍 Fetching trending topic..."
            TOPIC=$(python3 scripts/fetch_trending.py 2>/dev/null || echo "")
            if [ -z "$TOPIC" ]; then
              TOPIC=$(shuf -n 1 topics.txt)
              echo "⚠️ Trending fetch failed — using topics.txt: $TOPIC"
            else
              echo "🔥 Trending: $TOPIC"
            fi
          fi
          echo "topic=$TOPIC" >> $GITHUB_OUTPUT

      - name: 🤖 Generate script
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          node scripts/generate_script.js "${{ steps.topic.outputs.topic }}"
          cat output/voiceover_text.txt | head -3
          echo "✅ Script generated"

      - name: 📝 Generate metadata
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          node scripts/generate_metadata.js
          echo "✅ Metadata generated"

      - name: 🎙️ Generate female voiceover
        run: |
          python3 scripts/generate_tts.py
          ls -lh output/voiceover.mp3
          echo "✅ Female voiceover ready"

      - name: 🎭 Generate lip-sync avatar
        run: |
          python3 scripts/generate_avatar.py || echo "⚠️ Avatar failed — assemble will use fallback"
          ls -lh output/ || true
          echo "✅ Avatar step done"

      - name: 🎵 Get background music
        env:
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          node scripts/get_music.js || echo "⚠️ Music failed — continuing without"
          echo "✅ Music step done"

      - name: 🎬 Assemble YouTube Short
        run: |
          node scripts/assemble_video.js
          ls -lh output/final_video.mp4
          echo "✅ Short assembled"

      - name: 🖼️ Generate thumbnail
        run: |
          node scripts/generate_thumbnail.js || echo "⚠️ Thumbnail failed — continuing"
          echo "✅ Thumbnail step done"

      - name: 📤 Upload to YouTube Shorts
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          node scripts/upload_youtube.js
          echo "✅ Uploaded to YouTube!"

      - name: 📊 Save run log
        if: always()
        run: |
          mkdir -p logs
          echo "$(date '+%Y-%m-%d %H:%M') | ${{ steps.topic.outputs.topic }}" >> logs/history.txt
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add logs/history.txt
          git diff --staged --quiet || git commit -m "📝 Log: ${{ steps.topic.outputs.topic }}"
          git push || true
